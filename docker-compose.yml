services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - db
    command: ["sh", "-c", "npx prisma migrate deploy && npx prisma db seed && node dist/server.js"]
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:15
    container_name: vizgrc_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: vizgrc
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: